services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: xo
      POSTGRES_PASSWORD: xo
      POSTGRES_DB: xo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./pkg/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./pkg/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xo -d xo"]
      interval: 5s
      timeout: 3s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama-init:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    restart: "no"
    entrypoint: ["ollama", "pull", "phi4-mini"] ##swap the models here
    environment:
      OLLAMA_HOST: http://ollama:11434

  xo:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: "postgres://xo:xo@postgres:5432/xo?sslmode=disable"
      OLLAMA_URL: "http://ollama:11434"
      GATEWAY_INTERNAL_URL: "http://gateway:8000"
      GOOGLE_APPLICATION_CREDENTIALS: ""  # Set to path of Firebase service account JSON for FCM
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql://xo:xo@postgres:5432/xo"
      XO_SERVICE_URL: "http://xo:8080"
      JWT_SECRET: "dev-secret-change-in-production"
      CORS_ORIGINS: "*"
      PORT: "8000"
    depends_on:
      postgres:
        condition: service_healthy
      xo:
        condition: service_started

volumes:
  pgdata:
  ollama_data:
