# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Create a .env file from .env.example before running.

services:
  postgres:
    restart: unless-stopped
    ports: []   # internal only

  xo:
    restart: unless-stopped
    ports: []   # internal only — gateway proxies it
    environment:
      DATABASE_URL: "postgres://xo:xo@postgres:5432/xo?sslmode=disable"
      LISTEN_ADDR: ":8080"
      NOTIFICATION_WEBHOOK_URL: ""
      FCM_PROJECT_ID: ""
      GOOGLE_APPLICATION_CREDENTIALS: "/app/secrets/firebase-sa.json"

  gateway:
    restart: unless-stopped
    ports: []   # internal only — caddy proxies it
    environment:
      DATABASE_URL: "postgresql://xo:xo@postgres:5432/xo"
      XO_SERVICE_URL: "http://xo:8080"
      JWT_SECRET: "${JWT_SECRET}"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_MINUTES: "30"
      JWT_REFRESH_TOKEN_DAYS: "30"
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8000"
      UPLOAD_DIR: "/app/uploads"
      CORS_ORIGINS: '["https://api.sayzo.in"]'

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"    # for Let's Encrypt HTTP challenge
      - "443:443"  # HTTPS
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  postgres_data:
  gateway_uploads:
  caddy_data:
  caddy_config:
