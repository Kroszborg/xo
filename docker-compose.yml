services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: xo
      POSTGRES_PASSWORD: xo
      POSTGRES_DB: xo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Apply the schema automatically on first start.
      - ./pkg/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./pkg/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - ./gateway/schema.sql:/docker-entrypoint-initdb.d/03-gateway-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U xo -d xo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── xo service ───────────────────────────────────────────────────────────────
  xo:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://xo:xo@postgres:5432/xo?sslmode=disable
      LISTEN_ADDR: ":8080"
      # Set to an external push-notification service URL in production.
      # When empty, notifications are logged to stdout.
      NOTIFICATION_WEBHOOK_URL: ""
      # FCM push notifications. Set FCM_PROJECT_ID and mount a service
      # account key file to GOOGLE_APPLICATION_CREDENTIALS to enable.
      FCM_PROJECT_ID: ""
      GOOGLE_APPLICATION_CREDENTIALS: "/app/secrets/firebase-sa.json"
    volumes:
      # Mount Firebase service account key for FCM. Create this file locally
      # or use Docker secrets in production.
      - ./secrets:/app/secrets:ro
    depends_on:
      postgres:
        condition: service_healthy

  # ── API Gateway ────────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://xo:xo@postgres:5432/xo?sslmode=disable
      XO_SERVICE_URL: http://xo:8080
      JWT_SECRET: "dev-secret-change-in-production"
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_MINUTES: "30"
      JWT_REFRESH_TOKEN_DAYS: "30"
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "8000"
      UPLOAD_DIR: "/app/uploads"
      CORS_ORIGINS: '["*"]'
    volumes:
      - gateway_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      xo:
        condition: service_started

volumes:
  postgres_data:
  gateway_uploads:
