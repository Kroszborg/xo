# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Create a .env file from .env.example before running.

services:
  postgres:
    restart: unless-stopped
    ports: []   # internal only

  ollama:
    restart: unless-stopped
    ports: []   # internal only

  xo:
    restart: unless-stopped
    ports: []   # internal only — gateway proxies it
    environment:
      DATABASE_URL: "postgres://xo:xo@postgres:5432/xo?sslmode=disable"
      OLLAMA_URL: "http://ollama:11434"
      GATEWAY_INTERNAL_URL: "http://gateway:8000"
      PORT: "8080"

  gateway:
    restart: unless-stopped
    ports: []   # internal only — caddy proxies it
    environment:
      DATABASE_URL: "postgresql://xo:xo@postgres:5432/xo"
      XO_SERVICE_URL: "http://xo:8080"
      JWT_SECRET: "${JWT_SECRET}"
      CORS_ORIGINS: "https://api.sayzo.in"
      PORT: "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"    # for Let's Encrypt HTTP challenge
      - "443:443"  # HTTPS
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway

volumes:
  pgdata:
  ollama_data:
  caddy_data:
  caddy_config:
